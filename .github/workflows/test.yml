name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit tests
      run: |
        pytest tests/test_newsvendor.py -v --tb=short

    - name: Run integration tests
      run: |
        pytest tests/test_methods.py -v --tb=short

    - name: Run end-to-end tests
      run: |
        pytest tests/test_runner.py -v --tb=short

    - name: Run all tests with coverage
      run: |
        pytest tests/ --cov=src --cov-report=xml --cov-report=term -v

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.python-version }}

    - name: Test with small config
      run: |
        python main.py --config-name=test_config || echo "Test run completed"

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pre-commit black mypy
        # Create a dummy venv or install in a way that matches the local structure
        python -m venv .venv
        .venv/bin/pip install black mypy

    - name: Run pre-commit hooks
      run: |
        pre-commit run --all-files --config .pre-commit-config.yaml
