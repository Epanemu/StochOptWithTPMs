# @package hydra.launcher
# Hydra SLURM Launcher Configuration
# This enables automatic job submission to SLURM cluster
# Each multirun job will be submitted as a separate SLURM job

submitit_folder: ${hydra.sweep.dir}/.submitit/%j
timeout_min: 43200 # 30 days to be safe
cpus_per_task: 16
gpus_per_node: 0
tasks_per_node: 1
mem_gb: 64
nodes: 1
name: SO-TPM_${hydra.job.override_dirname}
# SLURM partition (adjust based on your cluster)
#partition: "cpu,amd"  # Set to your partition name, e.g., "compute", "batch", etc.
partition: "cpulong,amdlong"  # Set to your partition name, e.g., "compute", "batch", etc.

# Additional SLURM parameters
# qos: null
# account: null
# constraint: null
# exclude: null
# gres: null
# ntasks_per_node: null
# signal_delay_s: 120
# max_num_timeout: 0
additional_parameters:
  mail-type: "FAIL"
  mail-user: "nemecj38@fel.cvut.cz"
