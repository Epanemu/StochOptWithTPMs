# Newsvendor with 5 products - low demand variability, distinct distributions
_target_: stochopt.problem.newsvendor.NewsvendorProblem
name: newsvendor4_exp
n_products: 4
costs: [1.0, 1.0, 1.0, 1.0]
prices: [2.0, 2.0, 2.0, 2.0]
demand_dist: "exponential"
demand_params:
  mean: [10.0, 2.0, 6.0, 5.0]
  std: [8.0, 10.0, 12.0, 9.0]
x_density: "uniform"
correlated: false
