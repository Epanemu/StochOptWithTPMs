defaults:
  - problem: newsvendor
  - method: robust
  - _self_

seed: 42
risk_level: 0.05
solver: gurobi

samples:
  train: 1000
  opt: 100
  test: 10000

mlflow:
  tracking_uri: "file://./mlruns"
  experiment_name: "stochopt_benchmark"

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${problem}/${method}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
