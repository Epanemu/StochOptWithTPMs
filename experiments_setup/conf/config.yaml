defaults:
  - problem: newsvendor
  - method: robust
  - _self_

seed: 42
risk_level: 0.05
solver: gurobi

samples:
  opt: 100
  train: 1000
  validation: 5000
  test: 10000
  train_decisions: 1000

mlflow:
  tracking_uri: "sqlite:///mlflow.db"  # SQLite database backend (recommended)
  experiment_name: "stochopt_benchmark"

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${problem}/${method}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
