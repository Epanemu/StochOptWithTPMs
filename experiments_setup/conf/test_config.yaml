defaults:
  - _self_

seed: 42
risk_level: 0.05
solver: appsi_highs  # HiGHS solver for testing

samples:
  train: 10
  opt: 5
  test: 20
  validation: 15

mlflow:
  tracking_uri: "sqlite:///test_mlflow.db"
  experiment_name: "test_experiment"

problem:
  _target_: src.problem.newsvendor.NewsvendorProblem
  n_products: 1
  costs: [1.0]
  prices: [2.0]
  demand_dist: "normal"
  demand_params:
    mean: [100.0]
    std: [20.0]
  x_density: "uniform"

method:
  name: robust

hydra:
  run:
    dir: test_outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
